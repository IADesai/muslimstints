<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petite Vue + Firebase + Ionic Capacitor</title>

    <!-- Firebase Modular SDKs (v9+) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signInWithEmailAndPassword,
        signOut,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDvPJe2pmsdUq2BRvtGG4SDpM936igXomI",
        authDomain: "muslimstints.firebaseapp.com",
        databaseURL:
          "https://muslimstints-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "muslimstints",
        storageBucket: "muslimstints.firebasestorage.app",
        messagingSenderId: "732662707541",
        appId: "1:732662707541:web:8a6865417857dd752febdc",
        measurementId: "G-9L0V36KZHY",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Initialize Petite Vue application
      const appInstance = PetiteVue.createApp({
        user: null, // Reactive property for the user object
        email: "",
        password: "",
        functionResponse: "",

        // Set the user when the auth state changes
        init() {
          onAuthStateChanged(auth, (user) => {
            this.user = user;
          });
        },

        // Login method
        async loginUser() {
          try {
            const userCredential = await signInWithEmailAndPassword(
              auth,
              this.email,
              this.password
            );
            this.user = userCredential.user; // Update the user after login
          } catch (error) {
            console.error("Login failed", error);
          }
        },

        // Logout method
        async logoutUser() {
          try {
            await signOut(auth);
            this.user = null; // Clear user on logout
          } catch (error) {
            console.error("Logout failed", error);
          }
        },

        // Example method to call Firebase cloud function
        async callServerlessFunction() {
          // Call a Firebase cloud function if needed
          // this.functionResponse = await callYourFunction();
        },
      });

      appInstance.init();
      appInstance.mount();
    </script>

    <!-- Additional dependencies -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/petite-vue@0.2.2"></script>

    <style>
      body {
        background: #eceff1;
        color: rgba(0, 0, 0, 0.87);
        font-family: Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body v-scope="appInstance">
    <div class="container py-5">
      <h1 class="text-center">muslimstints</h1>

      <!-- Authentication Form -->
      <div v-if="!user">
        <h2>Login</h2>
        <form @submit.prevent="loginUser">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              v-model="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              v-model="password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
      </div>

      <!-- Logout and User Info -->
      <div v-else>
        <h2>Welcome, {{ user.email }}</h2>
        <button @click="logoutUser" class="btn btn-danger">Logout</button>
        <button @click="callServerlessFunction" class="btn btn-secondary">
          Call Cloud Function
        </button>
        <p>{{ functionResponse }}</p>
      </div>
    </div>
  </body>
</html>
